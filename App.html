<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR G5 APP</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* hide sections */
.section{ display:none; }

/* active */
.active{ display:block; }

/* center box */
.center{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* box */
.box{
    background:#1c1c1c;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* input */
input{
    padding:10px;
    margin:10px;
    width:90%;
}

/* button */
button{
    padding:10px;
    background:red;
    color:white;
    border:none;
    width:100%;
}

/* video */
.video{
    height:100vh;
    scroll-snap-align:start;
}

iframe{
    width:100%;
    height:100%;
}

/* profile button */
.profile-btn{
    position:fixed;
    top:10px;
    right:10px;
    font-size:20px;
}

/* scroll */
.container{
    scroll-snap-type:y mandatory;
    overflow-y:scroll;
    height:100vh;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="section active center">
<div class="box">
<h2 id="title">Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="submitForm()">Login</button>
<p onclick="toggle()">Create account</p>
</div>
</div>

<!-- APP -->
<div id="app" class="section">

<div class="profile-btn" onclick="showProfile()">👤</div>

<div class="container">

<div class="video">
<iframe src="https://www.youtube.com/embed/L4Lkt2r8GSw"></iframe>
<button onclick="like(this)">❤️</button>
</div>

<div class="video">
<iframe src="https://www.youtube.com/embed/wtV7uEJUpHY"></iframe>
<button onclick="like(this)">❤️</button>
</div>

<div class="video">
<iframe src="https://www.youtube.com/embed/1vfA8E-rBFk"></iframe>
<button onclick="like(this)">❤️</button>
</div>

</div>
</div>

<!-- PROFILE -->
<div id="profile" class="section center">
<div class="box">
<h2>Profile</h2>
<p id="username"></p>

<button onclick="back()">⬅ Back</button>
<button onclick="logout()">Logout</button>
<button onclick="viewLikes()">❤️ Likes</button>
</div>
</div>

<script>
let isLogin=true;

// SWITCH LOGIN/SIGNUP
function toggle(){
    isLogin=!isLogin;
    document.getElementById("title").innerText=isLogin?"Login":"Sign Up";
}

// LOGIN/SIGNUP
function submitForm(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(isLogin){
        if(u===localStorage.user && p===localStorage.pass){
            localStorage.loggedIn="true";
            showApp();
        }else alert("Wrong ❌");
    }else{
        localStorage.user=u;
        localStorage.pass=p;
        alert("Account created ✅");
    }
}

// SHOW APP
function showApp(){
    document.getElementById("login").classList.remove("active");
    document.getElementById("app").classList.add("active");
}

// PROFILE
function showProfile(){
    document.getElementById("app").classList.remove("active");
    document.getElementById("profile").classList.add("active");

    document.getElementById("username").innerText="User: "+localStorage.user;
}

// BACK
function back(){
    document.getElementById("profile").classList.remove("active");
    document.getElementById("app").classList.add("active");
}

// LOGOUT
function logout(){
    localStorage.loggedIn="false";
    location.reload();
}

// LIKE SAVE
function like(btn){
    btn.style.background="green";

    let id=btn.previousElementSibling.src;
    let likes=JSON.parse(localStorage.likes||"[]");

    if(!likes.includes(id)){
        likes.push(id);
        localStorage.likes=JSON.stringify(likes);
    }
}

// VIEW LIKES
function viewLikes(){
    alert(localStorage.likes);
}

// AUTO LOGIN
if(localStorage.loggedIn==="true"){
    showApp();
}
</script>

</body>
</html>
