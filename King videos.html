<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR G5 Videos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
    background: #1f1f1f;
}

/* Video Grid */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Card */
.card {
    background: #1c1c1c;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Video */
iframe {
    width: 100%;
    height: 200px;
    border: none;
}

/* Title */
.title {
    padding: 10px;
    font-size: 14px;
}

/* Button */
.btn {
    display: block;
    text-align: center;
    padding: 10px;
    background: red;
    color: white;
    text-decoration: none;
    margin: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>🔥 MR G5 Tech Videos 🔥</header>

<div class="container">

<!-- Video 1 -->
<div class="card">
<iframe src="https://www.youtube.com/embed/L4Lkt2r8GSw" allowfullscreen></iframe>
<div class="title">Amazing Tech Tutorial 1</div>
<a href="https://youtu.be/L4Lkt2r8GSw" class="btn">Watch on YouTube</a>
</div>

<!-- Video 2 -->
<div class="card">
<iframe src="https://www.youtube.com/embed/wtV7uEJUpHY" allowfullscreen></iframe>
<div class="title">Amazing Tech Tutorial 2</div>
<a href="https://youtu.be/wtV7uEJUpHY" class="btn">Watch on YouTube</a>
</div>

<!-- Shorts -->
<div class="card">
<iframe src="https://www.youtube.com/embed/1vfA8E-rBFk" allowfullscreen></iframe>
<div class="title">Short Video 1</div>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/CwQaO_IH7ys" allowfullscreen></iframe>
<div class="title">Short Video 2</div>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/8uVegLQRcMc" allowfullscreen></iframe>
<div class="title">Short Video 3</div>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/dHHS-0survU" allowfullscreen></iframe>

</div>

</div>

</div>

</body>
  </html>
